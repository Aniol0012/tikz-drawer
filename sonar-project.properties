# Project identification (update these values to match your SonarCloud project)
sonar.projectKey=tikz-drawer
sonar.projectName=tikz-drawer
sonar.host.url=https://sonarcloud.io

# Required for SonarCloud
sonar.organization=${env.SONAR_ORGANIZATION}

# Source code and tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts
sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**

# Coverage report (enable if generated by Vitest)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Rule exclusions (edit as needed) ---
# Example: disable one TypeScript rule for all TS files
# sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S7780
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.ts

# You can add more entries: e2, e3, ...
# sonar.issue.ignore.multicriteria=e1,e2
# sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S125
# sonar.issue.ignore.multicriteria.e2.resourceKey=src/app/legacy/**/*.ts

