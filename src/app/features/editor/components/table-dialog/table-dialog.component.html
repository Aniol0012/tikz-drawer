<div class="table-dialog-backdrop" (click)="cancelDialog.emit()">
  <section class="table-dialog" (click)="$event.stopPropagation()">
    <header class="table-dialog__header">
      <div class="table-dialog__copy">
        <p>{{ quickPickerLabel() }}</p>
        <h2>{{ title() }}</h2>
        <span>{{ description() }}</span>
      </div>
      <button
        class="table-dialog__close"
        type="button"
        (click)="cancelDialog.emit()"
        [attr.aria-label]="cancelLabel()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M6.7 6.7a1 1 0 0 1 1.4 0L12 10.58l3.9-3.88a1 1 0 0 1 1.4 1.42L13.42 12l3.88 3.9a1 1 0 0 1-1.42 1.4L12 13.42l-3.9 3.88a1 1 0 1 1-1.4-1.42L10.58 12 6.7 8.1a1 1 0 0 1 0-1.4Z"></path>
        </svg>
      </button>
    </header>

    <div class="table-dialog__body">
      <div class="table-dialog__picker-shell">
        <div
          class="table-dialog__picker"
          [style.--table-picker-columns]="maxPickerColumns()"
          (mouseleave)="clearPreview()">
          @for (row of pickerRows(); track trackByIndex($index)) {
            @for (column of pickerColumns(); track trackByIndex($index)) {
              <button
                class="table-dialog__cell"
                type="button"
                [class.is-active]="isCellActive(cell(row, column))"
                (mouseenter)="previewSelection(cell(row, column))"
                (focus)="previewSelection(cell(row, column))"
                (click)="selectDimensions(cell(row, column))"
                [attr.aria-label]="column + ' x ' + row"></button>
            }
          }
        </div>
        <div class="table-dialog__size">{{ sizeLabel() }}</div>
      </div>

      <div class="table-dialog__inputs">
        <label class="table-dialog__field">
          <span>{{ columnsLabel() }}</span>
          <input
            type="number"
            min="1"
            max="24"
            [value]="selectedColumns()"
            (input)="updateColumns($event)" />
        </label>
        <label class="table-dialog__field">
          <span>{{ rowsLabel() }}</span>
          <input
            type="number"
            min="1"
            max="24"
            [value]="selectedRows()"
            (input)="updateRows($event)" />
        </label>
      </div>
    </div>

    <footer class="table-dialog__footer">
      <button
        class="table-dialog__button table-dialog__button--secondary"
        type="button"
        (click)="cancelDialog.emit()">
        {{ cancelLabel() }}
      </button>
      <button
        class="table-dialog__button table-dialog__button--primary"
        type="button"
        (click)="submit()">
        {{ confirmLabel() }}
      </button>
    </footer>
  </section>
</div>
