<div class="sidebar-shell-header">
  <button
    class="sidebar-shell-toggle"
    type="button"
    [title]="collapsed() ? t('expand') : t('collapse')"
    [attr.aria-label]="collapsed() ? t('expand') : t('collapse')"
    [attr.aria-expanded]="!collapsed()"
    (click)="toggleCollapsed.emit()">
    <svg
      viewBox="0 0 24 24"
      aria-hidden="true"
      [class.sidebar-shell-toggle__icon--mobile]="mobileLayout()"
      [class.sidebar-shell-toggle__icon--collapsed]="collapsed()">
      <path [attr.d]="iconMap()['chevronDown']"></path>
    </svg>
  </button>
</div>

@if (!collapsed()) {
  <ng-content></ng-content>
}
