<div class="modal-backdrop">
  <section class="export-modal" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
    <header class="export-modal__header">
      <div>
        <p>{{ 'exportTitle' | translate }}</p>
        <h2>{{ 'export' | translate }}</h2>
        <span>{{ 'exportDescription' | translate }}</span>
      </div>
      <button class="icon-button" type="button" [attr.aria-label]="'close' | translate" (click)="closeDialog.emit()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path [attr.d]="icon('close')"></path></svg>
      </button>
    </header>

    <div class="share-panel share-panel--top">
      <label class="field field--full">
        <span>{{ 'shareLink' | translate }}</span>
        <div class="share-field">
          <input type="text" readonly [value]="shareUrl()" />
          <app-copy-button
            appearance="secondary"
            [text]="'copyLink' | translate"
            [copyLabel]="'copyLink' | translate"
            [successLabel]="'copied' | translate"
            [errorLabel]="'copyError' | translate"
            [iconPath]="icon('link')"
            [resolveValue]="shareLinkCopyValue()"
            (copied)="shareLinkCopied.emit($event)"
            (copyError)="copyError.emit($event)"></app-copy-button>
          <a class="secondary-button" [href]="shareUrl()" target="_blank" rel="noopener"
            ><svg viewBox="0 0 24 24" aria-hidden="true">
              <path [attr.d]="icon('open')"></path></svg
            ><span>{{ 'openSharedLink' | translate }}</span></a
          >
        </div>
      </label>
    </div>

    <div class="export-toolbar">
      <div class="export-toolbar__meta">
        <div class="mode-switch">
          <button type="button" [class.is-active]="exportMode() === 'snippet'" (click)="exportModeChange.emit('snippet')">
            {{ 'snippet' | translate }}
          </button>
          <button type="button" [class.is-active]="exportMode() === 'standalone'" (click)="exportModeChange.emit('standalone')">
            {{ 'standalone' | translate }}
          </button>
        </div>
      </div>
      <div class="export-actions-grid">
        <button class="secondary-button export-btn export-btn--png" type="button" (click)="downloadPng.emit()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path [attr.d]="icon('exportPng')"></path></svg
          ><span>{{ 'downloadPng' | translate }}</span>
        </button>
        <button class="secondary-button export-btn export-btn--svg" type="button" (click)="downloadSvg.emit()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path [attr.d]="icon('exportSvg')"></path></svg
          ><span>{{ 'downloadSvg' | translate }}</span>
        </button>
        <button class="secondary-button export-btn export-btn--json" type="button" (click)="downloadProjectJson.emit()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path [attr.d]="icon('exportJson')"></path></svg
          ><span>{{ 'downloadProjectJson' | translate }}</span>
        </button>
        <button class="secondary-button export-btn" type="button" (click)="openSettings.emit()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path [attr.d]="icon('sliders')"></path></svg
          ><span>{{ 'latexSettings' | translate }}</span>
        </button>
        <button class="secondary-button export-btn export-btn--tex" type="button" (click)="downloadTex.emit()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path [attr.d]="icon('exportTex')"></path></svg
          ><span>{{ 'downloadTex' | translate }}</span>
        </button>
      </div>
    </div>

    @if (exportMode() === 'snippet') {
      <section class="export-section">
        <div class="code-panel__header">
          <h3>{{ 'latexImports' | translate }}</h3>
        </div>
        <div class="code-panel">
          <div class="code-block-shell">
            <app-copy-button
              class="code-copy-button"
              [value]="exportImports()"
              [copyLabel]="'copy' | translate"
              [successLabel]="'copied' | translate"
              [errorLabel]="'copyError' | translate"
              [iconPath]="icon('copy')"
              (copyError)="copyError.emit($event)"></app-copy-button>
            <pre class="code-block code-block--modal code-block--imports"><code [innerHTML]="highlightedExportImports()"></code></pre>
          </div>
        </div>
      </section>
    }

    <section class="export-section">
      <div class="code-panel__header">
        <h3>{{ exportMode() === 'snippet' ? ('latexCode' | translate) : ('standalone' | translate) }}</h3>
      </div>
      <div class="code-panel">
        <div class="code-block-shell">
          <app-copy-button
            class="code-copy-button"
            [value]="exportCode()"
            [copyLabel]="'copy' | translate"
            [successLabel]="'copied' | translate"
            [errorLabel]="'copyError' | translate"
            [iconPath]="icon('copy')"
            (copyError)="copyError.emit($event)"></app-copy-button>
          <pre class="code-block code-block--modal"><code [innerHTML]="highlightedExportCode()"></code></pre>
        </div>
      </div>
    </section>
  </section>
</div>
