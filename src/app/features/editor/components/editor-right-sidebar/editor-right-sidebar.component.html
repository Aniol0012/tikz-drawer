@if (showSidebarContent()) {
  <div class="sidebar-tabs" [attr.data-active-tab]="editor().inspectorTab()">
    <button type="button" [class.is-active]="editor().inspectorTab() === 'properties'" (click)="editor().setInspectorTab('properties')">
      {{ editor().t('properties') }}
    </button>
    <button type="button" [class.is-active]="editor().inspectorTab() === 'scene'" (click)="editor().openSceneLayers()">
      {{ editor().t('sceneTab') }}
    </button>
  </div>

  <div #sidebarScroll class="sidebar-scroll">
    <ng-content></ng-content>
  </div>
}
