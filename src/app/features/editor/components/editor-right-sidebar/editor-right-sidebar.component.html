@if (showSidebarContent()) {
  <div class="sidebar-tabs" [attr.data-active-tab]="editor().inspectorTab()">
    <button type="button" [class.is-active]="editor().inspectorTab() === 'properties'" (click)="editor().setInspectorTab('properties')">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path [attr.d]="iconMap.sliders"></path>
      </svg>
      <span>{{ editor().t('properties') }}</span>
    </button>
    <button type="button" [class.is-active]="editor().inspectorTab() === 'scene'" (click)="editor().openSceneLayers()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path [attr.d]="iconMap.scene"></path>
      </svg>
      <span>{{ editor().t('sceneTab') }}</span>
    </button>
    <button
      class="ai-sparkles-trigger"
      data-ai-tab-target
      type="button"
      [class.is-active]="editor().inspectorTab() === 'assistant'"
      (click)="editor().openAssistant()">
      <app-ai-sparkles-icon></app-ai-sparkles-icon>
      <span>{{ editor().t('ai.tab') }}</span>
    </button>
  </div>

  <div #sidebarScroll class="sidebar-scroll">
    <ng-content></ng-content>
  </div>
}
