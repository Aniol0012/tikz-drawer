name: Sync README Dependencies Badge Versions

on:
  workflow_dispatch:

jobs:
  sync-readme-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update README badge versions
        run: node scripts/update-readme-badges.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet -- README.md; then
            echo "README badge versions are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync README badge versions"
          git push

