name: Sync README Dependencies Badge Versions

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-readme-badges-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync-readme-badges:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request_target' &&
        contains(github.event.pull_request.labels.*.name, 'dependencies') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.user.login == 'dependabot[bot]'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update README badge versions
        run: node scripts/update-readme-badges.mjs

      - name: Commit and push changes
        env:
          TARGET_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- README.md; then
            echo "README badge versions are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync README badge versions"

          case "$TARGET_REF" in
            *[!A-Za-z0-9._/-]* | '' | .* | */. | *..* )
              echo "Invalid target ref: $TARGET_REF"
              exit 1
              ;;
          esac

          git push origin "HEAD:$TARGET_REF"

