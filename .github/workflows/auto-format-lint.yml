name: Auto Format & Lint

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: repo-writes-auto-format-lint-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format-lint-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prettier fixes
        run: pnpm run lint-fix

      - name: Commit and push fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(ci): apply prettier fixes [skip ci]"

            for attempt in 1 2 3; do
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                echo "Formatting fixes pushed successfully."
                exit 0
              fi

              echo "Push rejected (attempt ${attempt}/3). Rebase and retry..."
              git fetch origin "${GITHUB_REF_NAME}"
              git rebase "origin/${GITHUB_REF_NAME}"
            done

            echo "Failed to push formatting fixes after 3 attempts."
            exit 1
          else
            echo "No changes to commit."
          fi

