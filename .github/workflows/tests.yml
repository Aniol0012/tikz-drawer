name: Tests

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run app and LaTeX validation
        run: |
          set -euo pipefail

          mkdir -p .artifacts/ci-logs .artifacts/tikz-validation

          (
            set -euo pipefail
            pnpm test
            pnpm build
          ) > .artifacts/ci-logs/app-validation.log 2>&1 &
          app_pid=$!

          (
            set -euo pipefail
            pnpm generate:latex-validation
            test -s .artifacts/tikz-validation/output.tex
            grep -q '\\begin{tikzpicture}' .artifacts/tikz-validation/output.tex
            docker run --rm \
              -v "$PWD:/workspace" \
              -w /workspace \
              dxjoke/tectonic-docker:latest \
              tectonic -X compile \
              .artifacts/tikz-validation/output.tex \
              --outdir .artifacts/tikz-validation
            test -s .artifacts/tikz-validation/output.pdf
          ) > .artifacts/ci-logs/latex-validation.log 2>&1 &
          latex_pid=$!

          app_status=0
          latex_status=0

          wait "$app_pid" || app_status=$?
          wait "$latex_pid" || latex_status=$?

          echo "App validation log:"
          cat .artifacts/ci-logs/app-validation.log
          echo
          echo "LaTeX validation log:"
          cat .artifacts/ci-logs/latex-validation.log

          test "$app_status" -eq 0
          test "$latex_status" -eq 0

      - name: Upload TikZ validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tikz-validation
          path: .artifacts/tikz-validation
