name: Tests

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm test

      - name: Build application
        run: pnpm build

  latex-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate LaTeX validation fixture
        run: pnpm generate:latex-validation

      - name: Ensure output.tex is not empty
        run: |
          test -s .artifacts/tikz-validation/output.tex
          grep -q '\\begin{tikzpicture}' .artifacts/tikz-validation/output.tex

      - name: Compile TikZ validation fixture with Tectonic
        run: >
          docker run --rm
          -v "$PWD:/workspace"
          -w /workspace
          dxjoke/tectonic-docker:latest
          tectonic -X compile
          .artifacts/tikz-validation/output.tex
          --outdir .artifacts/tikz-validation

      - name: Ensure output.pdf was produced
        run: test -s .artifacts/tikz-validation/output.pdf

      - name: Upload TikZ validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tikz-validation
          path: .artifacts/tikz-validation
