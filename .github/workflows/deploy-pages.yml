name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows:
      - Tests
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: repo-writes-deploy-pages-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      TARGET_REF_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_SHA }}

      - name: Detect version change in target commit
        id: detect-version-change
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          TARGET_SHA="${TARGET_SHA}"
          PARENT_SHA="$(git rev-list --parents -n 1 "$TARGET_SHA" | awk '{print $2}')"

          if [ -n "$PARENT_SHA" ] && git diff --unified=0 "$PARENT_SHA" "$TARGET_SHA" -- package.json | grep -Eq '^[+-][[:space:]]*"version"[[:space:]]*:'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version in package.json changed in target commit ($TARGET_SHA)."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No package.json version change detected for target commit ($TARGET_SHA)."
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Bump package version (patch)
        if: github.event_name == 'workflow_run' && steps.detect-version-change.outputs.changed == 'false'
        shell: bash
        run: npm version patch --no-git-tag-version

      - name: Update README version badge
        if: github.event_name == 'workflow_run' && steps.detect-version-change.outputs.changed == 'false'
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const version = packageJson.version;
          const encodedVersion = encodeURIComponent(version);
          const badgeUrl = `https://img.shields.io/badge/version-${encodedVersion}-blue?style=flat-square&logo=git&logoColor=white`;

          const readmePath = 'README.md';
          const original = fs.readFileSync(readmePath, 'utf8');

          const badgeRegex = /\[!\[Version\]\(https:\/\/img\.shields\.io\/badge\/version-[^)]*\)\]\(([^)]+)\)/;
          const next = original.replace(badgeRegex, `[![Version](${badgeUrl})]($1)`);

          if (next === original) {
            console.log('No README badge changes detected.');
          } else {
            fs.writeFileSync(readmePath, next);
            console.log(`README version badge updated to ${version}.`);
          }
          NODE

      - name: Commit and push bumped version
        if: github.event_name == 'workflow_run' && steps.detect-version-change.outputs.changed == 'false'
        shell: bash
        run: |
          if [ -z "$(git status --porcelain package.json README.md)" ]; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json README.md
          git commit -m "chore(ci): bump package version"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${TARGET_REF_NAME}"; then
              echo "Version bump pushed successfully."
              exit 0
            fi

            echo "Push rejected (attempt ${attempt}/3). Rebase and retry..."
            git fetch origin "${TARGET_REF_NAME}"
            git rebase "origin/${TARGET_REF_NAME}"
          done

          echo "Failed to push version bump after 3 attempts."
          exit 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app for GitHub Pages
        run: pnpm ng build --configuration production --base-href /tikz-drawer/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/tikz-drawer/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
