name: Auto Version Bump

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect version change in pushed commits
        id: detect-version-change
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            RANGE="$AFTER^..$AFTER"
          else
            RANGE="$BEFORE..$AFTER"
          fi

          if git log --format= --patch "$RANGE" -- package.json | grep -Eq '^[+-][[:space:]]*"version"[[:space:]]*:'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected package.json version change in push range ($RANGE)."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No package.json version change detected in push range ($RANGE)."
          fi

      - name: Bump patch version
        if: steps.detect-version-change.outputs.changed == 'false'
        shell: bash
        run: npm version patch --no-git-tag-version

      - name: Commit and push bumped version
        if: steps.detect-version-change.outputs.changed == 'false'
        shell: bash
        run: |
          if [ -z "$(git status --porcelain package.json)" ]; then
            echo "No version changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json
          git commit -m "chore(ci): bump package version [skip ci] to $(node -p -e "require('./package.json').version")"
          git push origin "HEAD:${GITHUB_REF_NAME}"

